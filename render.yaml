services:
  - type: web
    name: reliabilitygraph
    runtime: docker
    plan: standard
    region: oregon
    dockerContext: .
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /health
    autoDeployTrigger: commit
    disk:
      name: reliabilitygraph-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: RELIABILITY_GRAPH_PUBLIC_DEMO
        value: "true"
      - key: RELIABILITY_GRAPH_ALLOW_KEY_MANAGEMENT
        value: "false"
      - key: RELIABILITY_GRAPH_COOKIE_SECURE
        value: "true"
      - key: RELIABILITY_GRAPH_RATE_LIMIT_REQUESTS
        value: "120"
      - key: RELIABILITY_GRAPH_RATE_LIMIT_WINDOW_SECONDS
        value: "3600"
      - key: RELIABILITY_GRAPH_DB
        value: /app/data/reliability_graph.sqlite
      - key: TINKER_BASE_URL
        value: https://tinker.thinkingmachines.dev/services/tinker-prod/oai/api/v1
      - key: RELIABILITY_GRAPH_ACCESS_TOKEN
        sync: false
      - key: RELIABILITY_GRAPH_SECRET
        sync: false
      - key: TINKER_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: TINKER_MODEL
        sync: false
